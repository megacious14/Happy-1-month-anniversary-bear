<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🧸💗</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("IMG_3907.jpeg") center/cover no-repeat;
  filter: blur(6px) brightness(0.35);
  transform: scale(1.05);
  z-index: -1;
}

/* PAGE */
.container {
  position: absolute;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 30px;
  box-sizing: border-box;
}

.show {
  display: flex;
  z-index: 10;
}

/* TEXT */
h1, h2, p {
  text-shadow: 0 2px 10px black;
}

h2 { font-size: 30px; }
p { font-size: 20px; max-width: 700px; }

/* BUTTON */
button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
  font-size: 16px;
  cursor: pointer;
}

/* INPUT (FORCE ABOVE EVERYTHING) */
input {
  padding: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  text-align: center;
  margin-top: 15px;
  z-index: 50;
  position: relative;
}

/* SLIDESHOW */
.slide {
  display: none;
  width: 300px;
  height: 300px;
  object-fit: cover;
  border-radius: 20px;
}
.active { display: block; }

/* CURSOR */
#cursor { animation: blink 1s infinite; }
@keyframes blink { 50% {opacity:0;} }

/* HEARTS */
.heart {
  position: fixed;
  animation: float 6s linear infinite;
}
@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- START -->
<div class="container show" id="start">
  <h1>For You 🧸💗</h1>
  <button onclick="start()">Start 💗</button>
</div>

<!-- CODE SCREEN -->
<div class="container" id="codeScreen">
  <h2>Enter our code 💗</h2>
  <p style="opacity:0.7;">hint: when we started dating…</p>
  <input type="password" id="codeInput" placeholder="type here">
</div>

<!-- COUNTDOWN -->
<div class="container" id="countdown">
  <h2>We've been together for 💗</h2>
  <p id="time"></p>
  <button onclick="goTo('message')">Next 💗</button>
</div>

<!-- MESSAGE -->
<div class="container" id="message">
  <h2>💌</h2>
  <p id="typedText"></p>
  <button onclick="goTo('gallery')">Next 💗</button>
</div>

<!-- GALLERY -->
<div class="container" id="gallery">
  <h2>Us 💗</h2>

  <img class="slide active" src="IMG_3908.jpeg">
  <img class="slide" src="IMG_3909.jpeg">
  <img class="slide" src="IMG_3910.jpeg">
  <img class="slide" src="IMG_3912.jpeg">
  <img class="slide" src="IMG_3913.jpeg">
  <img class="slide" src="IMG_3926.jpeg">
  <img class="slide" src="IMG_3927.jpeg">
  <img class="slide" src="IMG_3928.jpeg">

  <button onclick="goTo('playlist')">Final 💗</button>
</div>

<!-- PLAYLIST (ONLY ACTIVE LAST) -->
<div class="container" id="playlist">
  <h2>Our Playlist 🎶</h2>

  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/playlist/5pMJjbRnQiTY3k4cPpTSF2"
    width="90%" height="380"
    frameBorder="0"
    allow="autoplay; encrypted-media">
  </iframe>
</div>

<script>
let current = "start";

/* START */
function start() {
  document.getElementById("music").play();
  goTo("codeScreen");
}

/* NAVIGATION */
function goTo(id) {
  document.getElementById(current).classList.remove("show");
  document.getElementById(id).classList.add("show");
  current = id;

  if (id === "message") startTyping();
  if (id === "gallery") startSlideshow();
}

/* PASSWORD (WORKS 100%) */
document.getElementById("codeInput").addEventListener("input", function() {
  let val = this.value.toLowerCase().trim();
  if (val === "18thmarch") {
    goTo("countdown");
  }
});

/* COUNTDOWN */
let startDate = new Date("March 18, 2026");
setInterval(() => {
  let d = Math.floor((new Date() - startDate) / 86400000);
  document.getElementById("time").innerHTML = d + " days 💗";
}, 1000);

/* TYPING */
const text = `PASTE YOUR MESSAGE HERE`;

let i = 0;
let sound = new Audio("typing.mp3");

function startTyping() {
  let el = document.getElementById("typedText");
  el.innerHTML = "";
  i = 0;

  function type() {
    if (i < text.length) {
      sound.currentTime = 0;
      sound.play();
      el.innerHTML = text.substring(0, i + 1) + '<span id="cursor">|</span>';
      i++;
      setTimeout(type, 15);
    }
  }

  type();
}

/* SLIDESHOW */
function startSlideshow() {
  let slides = document.querySelectorAll(".slide");
  let i = 0;

  setInterval(() => {
    slides.forEach(s => s.classList.remove("active"));
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
  }, 2000);
}

/* HEARTS */
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💗";
  h.classList.add("heart");
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 500);
</script>

</body>
</html>
